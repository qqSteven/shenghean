<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>提交成功 — 乾翔关务</title>
<style>
:root{--blue:#0D2B5E;--gold:#C8963E;--gold-light:#E0B860;--text-primary:#E8E8E8;--text-muted:rgba(255,255,255,0.5);--border-glass:rgba(255,255,255,0.08)}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--blue);color:var(--text-primary);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative}
body::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(ellipse at center,rgba(200,150,62,0.06) 0%,transparent 70%);pointer-events:none}
.card{text-align:center;padding:3rem 2rem;background:rgba(255,255,255,0.03);border:1px solid var(--border-glass);border-radius:16px;max-width:480px;width:90%;position:relative;z-index:1}
.icon{font-size:4rem;margin-bottom:1.5rem;display:block}
h1{font-size:1.8rem;font-weight:800;margin-bottom:0.75rem}
h1 span{color:var(--gold)}
p{color:var(--text-muted);font-size:0.95rem;line-height:1.7;margin-bottom:2rem}
.btn{display:inline-block;padding:0.75rem 2rem;background:var(--gold);color:var(--blue);border:none;border-radius:8px;font-size:0.95rem;font-weight:700;text-decoration:none;cursor:pointer;transition:transform 0.2s,box-shadow 0.3s;box-shadow:0 4px 20px rgba(200,150,62,0.3)}
.btn:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(200,150,62,0.5)}







/* === 内容区可视背景 === */
.bg-finance{position:relative;background:linear-gradient(135deg,#0a1628 0%,#0d2b5e 50%,#0a2840 100%)}
.bg-finance::before{content:'';position:absolute;inset:0;opacity:0.3;z-index:0;pointer-events:none;
  background-image:repeating-linear-gradient(45deg,rgba(200,150,62,0.4) 0,rgba(200,150,62,0.4) 1px,transparent 1px,transparent 40px),
  radial-gradient(circle at 30% 40%,rgba(0,180,216,0.25) 0,transparent 50%),
  radial-gradient(circle at 70% 60%,rgba(200,150,62,0.2) 0,transparent 40%)}

.bg-logistics{position:relative;background:linear-gradient(160deg,#0a1628 0%,#0d2b4e 50%,#0a2840 100%)}
.bg-logistics::before{content:'';position:absolute;inset:0;opacity:0.3;z-index:0;pointer-events:none;
  background-image:radial-gradient(circle at 60% 30%,rgba(200,150,62,0.3) 0,transparent 55%),
  radial-gradient(circle at 25% 70%,rgba(180,140,70,0.2) 0,transparent 40%),
  radial-gradient(circle 3px,rgba(200,150,62,0.35) 50%,transparent 50%);
  background-size:100% 100%,100% 100%,50px 50px;
  background-position:0 0,0 0,25px 25px}

.bg-document{position:relative;background:linear-gradient(145deg,#0a1628 0%,#0d2b5e 50%,#0a2840 100%)}
.bg-document::before{content:'';position:absolute;inset:0;opacity:0.28;z-index:0;pointer-events:none;
  background-image:repeating-linear-gradient(0deg,transparent 0,transparent 58px,rgba(200,150,62,0.18) 58px,rgba(200,150,62,0.18) 59px),
  radial-gradient(ellipse at 70% 30%,rgba(200,160,80,0.3) 0,transparent 60%),
  radial-gradient(ellipse at 25% 65%,rgba(0,180,216,0.2) 0,transparent 50%)}

.bg-global{position:relative;background:linear-gradient(130deg,#0a1628 0%,#0d2b4e 50%,#0a2840 100%)}
.bg-global::before{content:'';position:absolute;inset:0;opacity:0.28;z-index:0;pointer-events:none;
  background-image:radial-gradient(circle at 30% 30%,rgba(0,180,216,0.25) 0,transparent 55%),
  radial-gradient(circle at 70% 70%,rgba(200,150,62,0.22) 0,transparent 50%),
  radial-gradient(circle 3px,rgba(200,150,62,0.25) 50%,transparent 50%);
  background-size:100% 100%,100% 100%,60px 60px;
  background-position:0 0,0 0,30px 30px}

.bg-network{position:relative;background:linear-gradient(120deg,#0a1628 0%,#0d2b5e 50%,#0a2840 100%)}
.bg-network::before{content:'';position:absolute;inset:0;opacity:0.28;z-index:0;pointer-events:none;
  background-image:radial-gradient(circle at 40% 30%,rgba(200,150,62,0.3) 0,transparent 55%),
  radial-gradient(circle at 70% 60%,rgba(0,180,216,0.2) 0,transparent 50%),
  radial-gradient(circle 4px,rgba(200,150,62,0.3) 50%,transparent 50%);
  background-size:100% 100%,100% 100%,80px 80px;
  background-position:0 0,0 0,20px 20px}

.bg-finance>.section-inner,.bg-finance>h2,.bg-finance>.content-grid,.bg-finance>.stats-row,.bg-finance>.info-grid,.bg-finance>.cta-banner,.bg-finance>.compare-table,.bg-finance>.cat-grid,.bg-finance>div[class],
.bg-logistics>.section-inner,.bg-logistics>h2,.bg-logistics>.content-grid,.bg-logistics>.stats-row,.bg-logistics>.info-grid,.bg-logistics>.cta-banner,.bg-logistics>.compare-table,.bg-logistics>.cat-grid,.bg-logistics>div[class],
.bg-document>.section-inner,.bg-document>h2,.bg-document>.content-grid,.bg-document>.stats-row,.bg-document>.info-grid,.bg-document>.cta-banner,.bg-document>.compare-table,.bg-document>.cat-grid,.bg-document>div[class],
.bg-global>.section-inner,.bg-global>h2,.bg-global>.content-grid,.bg-global>.stats-row,.bg-global>.info-grid,.bg-global>.cta-banner,.bg-global>.compare-table,.bg-global>.cat-grid,.bg-global>div[class],
.bg-network>.section-inner,.bg-network>h2,.bg-network>.content-grid,.bg-network>.stats-row,.bg-network>.info-grid,.bg-network>.cta-banner,.bg-network>.compare-table,.bg-network>.cat-grid,.bg-network>div[class]
{position:relative;z-index:1}

</style>
</head>
<body>
<div class="card">
  <span class="icon">&#9989;</span>
  <h1>提交<span>成功</span></h1>
  <p>感谢您的咨询！我们的专业团队将在<strong>24小时内</strong>与您联系。<br>如需紧急支持，请直接拨打 <strong style="color:var(--gold)">18228095651</strong></p>
  <a href="index.html" class="btn">返回首页</a>
</div>
</body>
</html>
