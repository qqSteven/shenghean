<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>提交成功 — 乾翔关务</title>
<style>
:root{--blue:#0D2B5E;--gold:#C8963E;--gold-light:#E0B860;--text-primary:#E8E8E8;--text-muted:rgba(255,255,255,0.5);--border-glass:rgba(255,255,255,0.08)}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--blue);color:var(--text-primary);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative}
body::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(ellipse at center,rgba(200,150,62,0.06) 0%,transparent 70%);pointer-events:none}
.card{text-align:center;padding:3rem 2rem;background:rgba(255,255,255,0.03);border:1px solid var(--border-glass);border-radius:16px;max-width:480px;width:90%;position:relative;z-index:1}
.icon{font-size:4rem;margin-bottom:1.5rem;display:block}
h1{font-size:1.8rem;font-weight:800;margin-bottom:0.75rem}
h1 span{color:var(--gold)}
p{color:var(--text-muted);font-size:0.95rem;line-height:1.7;margin-bottom:2rem}
.btn{display:inline-block;padding:0.75rem 2rem;background:var(--gold);color:var(--blue);border:none;border-radius:8px;font-size:0.95rem;font-weight:700;text-decoration:none;cursor:pointer;transition:transform 0.2s,box-shadow 0.3s;box-shadow:0 4px 20px rgba(200,150,62,0.3)}
.btn:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(200,150,62,0.5)}
</style>
</head>
<body>
<div class="card">
  <span class="icon">&#9989;</span>
  <h1>提交<span>成功</span></h1>
  <p>感谢您的咨询！我们的专业团队将在<strong>24小时内</strong>与您联系。<br>如需紧急支持，请直接拨打 <strong style="color:var(--gold)">18228095651</strong></p>
  <a href="index.html" class="btn">返回首页</a>
</div>
</body>
</html>
